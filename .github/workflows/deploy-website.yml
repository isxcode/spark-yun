name: deploy website

on:
  workflow_dispatch:
    inputs:
      github_access_token:
        description: 'github_access_token'
        required: true
        type: string
      repository_account:
        description: 'repository'
        required: true
        type: string
        default: 'ispong'
      branch_number:
        description: 'branch'
        required: true
        type: string
        default: 'main'

env:
  ADMIN_GITHUB_TOKEN: ${{ inputs.github_access_token }}

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        node:
          - '22'

    steps:

      - name: Checkout spark-yun
        uses: actions/checkout@v4
        with:
          token: ${{ env.ADMIN_GITHUB_TOKEN }}
          repository: ${{ inputs.repository_account }}/zhiqingyun-platform
          ref: ${{ inputs.branch_number }}
          path: "/home/runner/work/spark-yun/spark-yun/zhiqingyun-platform"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Build with Nodejs
        run: |
          cd /home/runner/work/spark-yun/spark-yun/zhiqingyun-platform/website
          pnpm install --force
          pnpm run build

      - name: Tar dist
        run: |
          cd /home/runner/work/spark-yun/spark-yun/zhiqingyun-platform/website
          tar -czf website.tar.gz ./.output
          mv website.tar.gz /home/runner/work/spark-yun/spark-yun/zhiqingyun-platform/

      - name: Copy website via ssh password
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          source: "website.tar.gz"
          target: /tmp/

      - name: Deploy website
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script_stop: true
          timeout: 1800s
          script: |
            set -euo pipefail
            export PATH=/opt/node/bin:$PATH
            node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 22) { throw new Error('Website runtime requires Node.js 22 or newer, current: ' + process.version) }"
            pm2 delete zhiqingyun-website || true
            rm -rf /opt/.output
            tar -vzxf /tmp/website.tar.gz -C /opt/
            rm -rf /tmp/website.tar.gz
            test -s /opt/.output/server/contents.sqlite
            test -s /opt/.output/public/__nuxt_content/content/sql_dump.txt
            HOST=127.0.0.1 PORT=3000 NODE_ENV=production pm2 start /opt/.output/server/index.mjs --name zhiqingyun-website --cwd /opt/.output --interpreter "$(command -v node)" --time --update-env
            sleep 3
            curl -fsS http://127.0.0.1:3000/zh/docs/1/6-mac | grep -q "Mac系统源码编译"
            pm2 save
